version: '3.9'

services:
  db:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password123
      MYSQL_DATABASE: muse_db
      MYSQL_USER: muse_root
      MYSQL_PASSWORD: muse_pass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    restart: always
    ports:
      - "80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: password123
    depends_on:
      - db

  minio:
    image: minio/minio
    container_name: muse-storage
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: muse
      MINIO_ROOT_PASSWORD: muse123
      MINIO_CONSOLE_ADDRESS: ":9001"
    command: server /data
    volumes:
      - minio_data:/data


volumes:
  db_data:
  minio_data:
